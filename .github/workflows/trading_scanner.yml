name: Trading Scanner

on:
  schedule:
    # GitHub Actions cron uses UTC. These two schedules cover 9:30 AM ET
    # during both daylight saving time and standard time. The Python script
    # checks the ET trading window, so the non-matching seasonal run exits quietly.
    - cron: '30 13 * * 1-5'   # 9:30 AM ET during daylight saving time
    - cron: '30 14 * * 1-5'   # 9:30 AM ET during standard time

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading scanner
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TMOBILE_NUMBER:     ${{ secrets.TMOBILE_NUMBER }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python day_trading_scanner.py --account 10000 --risk 1.0 --top 20
        continue-on-error: false

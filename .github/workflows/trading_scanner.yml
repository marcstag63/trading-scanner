name: Trading Scanner

on:
  schedule:
    # GitHub Actions cron uses UTC. Fire once at 9:30 AM ET — the Python script
    # loops every 5 minutes internally until 10:30 AM ET, so we only need one
    # trigger per day. Two entries cover DST: the non-matching one exits quietly.
    - cron: '30 13 * * 1-5'   # 9:30 AM ET during EDT (UTC-4, Mar–Nov)
    - cron: '30 14 * * 1-5'   # 9:30 AM ET during EST (UTC-5, Nov–Mar)

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    # 60-min trading window + up to 5 min per scan overhead + buffer = 90 min
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading scanner
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TMOBILE_NUMBER:     ${{ secrets.TMOBILE_NUMBER }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python day_trading_scanner.py --account 10000 --risk 1.0 --top 20
        continue-on-error: false

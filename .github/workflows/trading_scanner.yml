name: Trading Scanner

on:
  schedule:
    # 9:30 AM ET — UTC-4 in summer (EDT), UTC-5 in winter (EST)
    # Summer:  13:30 UTC  ← use this Mar–Nov (EDT)
    # Winter:  14:30 UTC  ← use this Nov–Mar (EST)
    - cron: '30 13 * * 1-5'   # Mon–Fri 9:30 AM EDT  ← FIX: was 25 13, fired before window opened

  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # kills job if something hangs (1hr scan + buffer)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading scanner
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TMOBILE_NUMBER:     ${{ secrets.TMOBILE_NUMBER }}
        run: python day_trading_scanner.py --account 10000 --risk 1.0
        continue-on-error: false
